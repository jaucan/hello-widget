  const intervalMs = 3000;
  const fadeMs = 180;
  const randomPerBlock = 6; // ES + EN + 6 aleatorios

const greetingsCount = greetings.length;

function buildBlock(){

const block = [ES, EN];
const usedIndexes = new Set();

while (usedIndexes.size < randomPerBlock){

const idx = Math.floor(Math.random() * greetingsCount);

if (!usedIndexes.has(idx)){
usedIndexes.add(idx);
block.push(greetings[idx]);
}
}

return block;
}

  let currentBlock = buildBlock();
  let idxInBlock = 1;              // ES already shown at init
  let lastLabel = ES.label;        // avoid same language twice in a row


let currentFontSize = "32px";
  function tick(){
    el.classList.add("is-fading");

    setTimeout(() => {

      if (idxInBlock >= currentBlock.length){
        idxInBlock = 0;
        currentBlock = buildBlock();
      }

      let nextGreeting = currentBlock[idxInBlock];

      // ✅ Avoid same language twice in a row (by label)
      let tries = 0;
      while (nextGreeting && nextGreeting.label === lastLabel && tries < currentBlock.length){
        idxInBlock++;
        if (idxInBlock >= currentBlock.length){
          idxInBlock = 0;
          currentBlock = buildBlock();
        }
        nextGreeting = currentBlock[idxInBlock];
        tries++;
      }

      // Fallback: reshuffle if we still land on the same label
      if (nextGreeting && nextGreeting.label === lastLabel){
        currentBlock = buildBlock();
        idxInBlock = 0;
        nextGreeting = currentBlock[idxInBlock];
      }

      const t = nextGreeting.text;
      const len = t.length;

      // Ajuste de tamaño según longitud
let newSize = "32px";

if (len > 20){
 newSize = "24px";
} else if (len > 12){
 newSize = "28px";
}

if (newSize !== currentFontSize){
 el.style.fontSize = newSize;
 currentFontSize = newSize;
}


      el.textContent = t;
      el.title = nextGreeting.label;
      el.classList.remove("is-fading");

      lastLabel = nextGreeting.label;
      idxInBlock++;

    }, fadeMs);
  }

  // init
  el.textContent = ES.text;
  el.title = ES.label;

  setInterval(tick, intervalMs);
